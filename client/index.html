<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CollabCode - Real-Time Code Editor</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .hero {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            z-index: 10;
        }
        .hero h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #3b82f6, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <nav class="navbar">
        <a href="/" class="nav-brand">CollabCode</a>
        <div class="nav-links">
            <a href="/login" class="btn btn-secondary">Login</a>
            <a href="/login" class="btn">Get Started</a>
        </div>
    </nav>

    <div class="hero">
        <div class="glass-panel" style="max-width: 800px;">
            <h1>Code together, instantly.</h1>
            <p>A real-time collaborative code editor supporting multiple languages. Compile and run your code on the cloud with zero setup.</p>
            <div class="flex justify-center gap-4 mt-4 text-center" style="justify-content: center;">
                <a href="/dashboard" class="btn">Start Coding</a>
            </div>
        </div>
    </div>
</body>
</html>
