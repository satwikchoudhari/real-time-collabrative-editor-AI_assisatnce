<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room - CollabCode</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { overflow: hidden; }
        .workspace { display: flex; height: calc(100vh - 75px); }
        .sidebar { width: 250px; background: var(--bg-secondary); border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; z-index: 5; }
        .sidebar-section { padding: 1rem; border-bottom: 1px solid var(--glass-border); flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .sidebar-section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .sidebar-section-header h3 { margin: 0; font-size: 1.1rem; }
        .file-list { flex: 1; overflow-y: auto; list-style: none; padding: 0; margin: 0; }
        .file-item { padding: 0.5rem; margin-bottom: 0.25rem; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; transition: background 0.2s; }
        .file-item:hover { background: rgba(255,255,255,0.05); }
        .file-item.active { background: rgba(255,255,255,0.1); border-left: 3px solid var(--primary); font-weight: 500; }
        .main-pane { flex: 1; display: flex; flex-direction: column; }
        #editor { flex: 1; min-height: 50vh; position: relative;}
        .terminal-panel { height: 30%; background: #0a0a0a; border-top: 1px solid var(--glass-border); display: flex; flex-direction: column; z-index: 5;}
        .terminal-header { background: #111; padding: 0.5rem 1rem; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; color: #fff;}
        .terminal-output { flex: 1; padding: 1rem; font-family: 'Consolas', monospace; color: #94a3b8; overflow-y: auto; white-space: pre-wrap; font-size: 14px;}
        .users-list { flex: 1; overflow-y: auto; }
        .user-pill { background: rgba(255,255,255,0.05); padding: 0.5rem; border-radius: 4px; margin-bottom: 0.5rem; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.1);}
        
        /* Cursor styling */
        .remote-cursor {
            width: 2px;
            height: 1.2em;
            position: absolute;
            z-index: 9;
            animation: blink 1s step-end infinite;
        }
        .remote-cursor-flag {
            position: absolute;
            top: -18px;
            left: 0;
            padding: 2px 6px;
            font-size: 10px;
            border-radius: 3px;
            color: white;
            white-space: nowrap;
            z-index: 10;
            pointer-events: none;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <nav class="navbar" style="padding: 1rem 2rem;">
        <div class="flex align-center gap-4">
            <a href="/dashboard" class="nav-brand" style="font-size: 1.25rem;">CollabCode</a>
            <span class="text-muted">|</span>
            <span id="roomNameDisplay" style="font-weight: 600;">Room Loading...</span>
        </div>
        <div class="nav-links flex gap-4 align-center">
            <select id="languageSelect" class="form-control" style="width: auto; padding: 0.5rem;" disabled title="Language is auto-detected from file extension">
                <option value="javascript">JavaScript</option>
                <option value="python">Python</option>
                <option value="c">C</option>
                <option value="cpp">C++</option>
                <option value="java">Java</option>
            </select>
            <button id="downloadBtn" class="btn btn-secondary" style="padding: 0.5rem 1rem;" title="Download Current File">⬇️ Download</button>
            <button id="runBtn" class="btn" style="padding: 0.5rem 1rem;">Run Code</button>
        </div>
    </nav>

    <div class="workspace">
        <div class="sidebar">
            <div class="sidebar-section" style="flex: 1.5;">
                <div class="sidebar-section-header">
                    <h3>Files</h3>
                    <div>
                        <button id="uploadBtn" class="btn btn-secondary" style="padding: 0.2rem 0.5rem; font-size: 1rem; margin-right: 0.5rem;" title="Upload files">⬆️</button>
                        <input type="file" id="fileUploadInput" multiple style="display: none;">
                        <button id="createFileBtn" class="btn" style="padding: 0.2rem 0.5rem; font-size: 1rem;">+</button>
                    </div>
                </div>
                <ul class="file-list" id="fileList">
                    <!-- Files will populate here -->
                </ul>
            </div>
            <div class="sidebar-section" style="flex: 1;">
                <h3 class="mb-4">Participants (<span id="userCount">0</span>)</h3>
                <div class="users-list" id="usersList"></div>
                <div class="mt-4 text-center">
                    <button class="btn btn-secondary" style="width: 100%; padding: 0.5rem;" onclick="navigator.clipboard.writeText(window.location.href); alert('Link copied!')">Share Link</button>
                </div>
            </div>
        </div>

        <div class="main-pane">
            <div id="editor"></div>
            
            <div class="terminal-panel">
                <div class="terminal-header">
                    <span>Terminal / Output</span>
                    <button class="btn btn-secondary" style="padding: 0.25rem 0.5rem; font-size: 0.75rem;" onclick="document.getElementById('terminalOutput').textContent=''">Clear</button>
                </div>
                <div class="terminal-output" id="terminalOutput">System ready. Awaiting execution.</div>
            </div>
        </div>
    </div>

    <!-- Socket.io client -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>

    <script>
        const socket = io();
        const roomId = window.location.pathname.split("/")[2];
        let username = "Anonymous";
        let monacoEditor;
        let roomFiles = {};
        let currentFile = "main.js";
        let cursorDecorations = {}; // map of socket.id -> collection

        const monacoLangMap = {
            "javascript": "javascript",
            "python": "python",
            "c": "c",
            "cpp": "cpp",
            "java": "java",
            "html": "html",
            "css": "css",
            "json": "json",
            "js": "javascript",
            "py": "python"
        };
        
        const extToBackendLang = {
            "js": "javascript",
            "py": "python",
            "c": "c",
            "cpp": "cpp",
            "java": "java"
        };

        const terminalOutput = document.getElementById("terminalOutput");
        const languageSelect = document.getElementById("languageSelect");
        const fileList = document.getElementById("fileList");

        function appendOutput(text, type="output") {
            const span = document.createElement("span");
            span.textContent = text + "\n";
            if(type === "error") span.style.color = "#ef4444"; 
            else if(type === "system") span.style.color = "#94a3b8"; 
            else span.style.color = "#a3e635"; 
            terminalOutput.appendChild(span);
            terminalOutput.scrollTop = terminalOutput.scrollHeight;
        }

        function renderFileList() {
            fileList.innerHTML = "";
            for (const filename in roomFiles) {
                const li = document.createElement("li");
                li.className = "file-item" + (filename === currentFile ? " active" : "");
                li.textContent = filename;
                li.onclick = () => switchFile(filename);
                fileList.appendChild(li);
            }
        }

        function switchFile(filename) {
            if (currentFile === filename || !monacoEditor) return;
            
            // Save current state
            roomFiles[currentFile] = monacoEditor.getValue();
            
            // Clear current remote cursors
            for(let id in cursorDecorations) {
                cursorDecorations[id].clear();
            }
            cursorDecorations = {};

            currentFile = filename;
            renderFileList();

            const ext = filename.split('.').pop();
            const lang = monacoLangMap[ext] || "javascript";
            monaco.editor.setModelLanguage(monacoEditor.getModel(), lang);
            
            const backendLang = extToBackendLang[ext] || "javascript";
            languageSelect.value = backendLang;
            
            monacoEditor.setValue(roomFiles[currentFile] || "");
        }

        document.getElementById("createFileBtn").addEventListener("click", () => {
            const filename = prompt("Enter file name (e.g., utils.js):");
            if (filename && !roomFiles[filename]) {
                socket.emit("file-created", filename);
            }
        });

        document.getElementById("downloadBtn").addEventListener("click", () => {
            const content = monacoEditor.getValue();
            const blob = new Blob([content], { type: "text/plain" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = currentFile;
            a.click();
            URL.revokeObjectURL(url);
        });

        const fileUploadInput = document.getElementById("fileUploadInput");
        document.getElementById("uploadBtn").addEventListener("click", () => fileUploadInput.click());
        
        fileUploadInput.addEventListener("change", (e) => {
            if (!e.target.files) return;
            for (let f of e.target.files) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const content = ev.target.result;
                    const filename = f.name;
                    if (!roomFiles[filename]) {
                        socket.emit("file-created", filename);
                        setTimeout(() => socket.emit("code-change", { filename, content }), 200);
                    } else {
                        socket.emit("code-change", { filename, content });
                    }
                };
                reader.readAsText(f);
            }
            e.target.value = "";
        });

        async function init() {
            try {
                const authRes = await fetch("/api/auth/me");
                const authData = await authRes.json();
                if (!authData.loggedIn) { window.location.href = `/login`; return; }
                username = authData.username;
            } catch(e) {}

            try {
                const roomRes = await fetch(`/api/rooms/${roomId}`);
                if (roomRes.ok) {
                    const roomData = await roomRes.json();
                    document.getElementById("roomNameDisplay").textContent = roomData.name || "Room";
                }
            } catch(e) {}

            socket.emit("join-room", { roomId, username });

            require.config({ paths: { "vs": "https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs" }});
            require(["vs/editor/editor.main"], function() {
                monacoEditor = monaco.editor.create(document.getElementById("editor"), {
                    value: "\n",
                    language: "javascript",
                    theme: "vs-dark",
                    automaticLayout: true,
                    fontSize: 15,
                    minimap: { enabled: false }
                });

                let isUpdating = false;

                // Sync code changes
                socket.on("code-change", (data) => {
                    const { filename, content } = data;
                    if (filename === currentFile) {
                        if (monacoEditor.getValue() !== content && content !== undefined) {
                            isUpdating = true;
                            const position = monacoEditor.getPosition();
                            monacoEditor.setValue(content);
                            if (position) monacoEditor.setPosition(position);
                            isUpdating = false; 
                        }
                    } else {
                        // Update background file state
                        roomFiles[filename] = content;
                    }
                });

                let timeout;
                monacoEditor.onDidChangeModelContent(() => {
                    if (!isUpdating) {
                        roomFiles[currentFile] = monacoEditor.getValue();
                        clearTimeout(timeout);
                        timeout = setTimeout(() => {
                            socket.emit("code-change", { filename: currentFile, content: monacoEditor.getValue() });
                        }, 400);
                    }
                });

                // Emit cursor position updates
                monacoEditor.onDidChangeCursorPosition((e) => {
                    socket.emit("cursor-change", {
                        filename: currentFile,
                        position: e.position
                    });
                });

                // Listen for remote cursor changes
                socket.on("cursor-change", (data) => {
                    if (!monacoEditor || data.filename !== currentFile) return;
                    
                    const { position, username, color, id } = data;
                    if (!cursorDecorations[id]) {
                        cursorDecorations[id] = monacoEditor.createDecorationsCollection([]);
                    }
                    
                    // Create inline css dynamically for the cursor color
                    const styleId = `cursor-style-${id}`;
                    let styleEl = document.getElementById(styleId);
                    if (!styleEl) {
                        styleEl = document.createElement('style');
                        styleEl.id = styleId;
                        document.head.appendChild(styleEl);
                    }
                    styleEl.innerHTML = `
                        .remote-cursor-${id} { border-left: 2px solid ${color}; position: absolute; height: 100%; border-radius: 2px; }
                        .remote-flag-${id} { background-color: ${color}; color: black; font-size: 10px; padding: 2px 4px; border-radius: 3px; position: absolute; top: -16px; left: 0; white-space: nowrap; font-weight: bold; }
                    `;

                    cursorDecorations[id].set([{
                        range: new monaco.Range(position.lineNumber, position.column, position.lineNumber, position.column),
                        options: {
                            className: `remote-cursor-${id}`,
                            hoverMessage: { value: username },
                            before: {
                                content: username,
                                inlineClassName: `remote-flag-${id}`,
                                cursorStops: monaco.editor.InjectedTextCursorStops.None,
                            }
                        }
                    }]);
                });

                socket.on("cursor-remove", (id) => {
                    if (cursorDecorations[id]) {
                        cursorDecorations[id].clear();
                        delete cursorDecorations[id];
                    }
                    const styleEl = document.getElementById(`cursor-style-${id}`);
                    if (styleEl) styleEl.remove();
                });

                socket.on("language-change", (lang) => {
                    languageSelect.value = lang;
                    monaco.editor.setModelLanguage(monacoEditor.getModel(), monacoLangMap[lang]);
                });

                socket.on("room-state", (data) => {
                    roomFiles = data.files;
                    if(data.language && monacoLangMap[data.language]) {
                        // languageSelect.value = data.language; // We might not want to force global language if files handle it
                    }
                    if (!roomFiles[currentFile]) {
                        currentFile = Object.keys(roomFiles)[0] || "main.js";
                    }
                    monacoEditor.setValue(roomFiles[currentFile] || "");
                    const ext = currentFile.split('.').pop();
                    monaco.editor.setModelLanguage(monacoEditor.getModel(), monacoLangMap[ext] || "javascript");
                    renderFileList();
                });

                socket.on("file-created", (filename) => {
                    if (!roomFiles[filename]) {
                        roomFiles[filename] = "\n";
                        renderFileList();
                    }
                });
            });

            socket.on("user-count", c => document.getElementById("userCount").textContent = c);
            socket.on("users-list", users => {
                const list = document.getElementById("usersList");
                list.innerHTML = "";
                users.forEach(u => {
                    list.innerHTML += `<div class="user-pill">${u === username ? u + ' (You)' : u}</div>`;
                });
            });

            socket.on("console-output", data => {
                if(typeof data === "string") appendOutput("> " + data, "output");
                else appendOutput("> " + data.text, data.type);
            });

            socket.on("user-left", (msg) => {
               // Add tiny toast or log to terminal if wanted.
            });

            languageSelect.addEventListener("change", (e) => {
                const lang = e.target.value;
                if(monacoEditor) monaco.editor.setModelLanguage(monacoEditor.getModel(), monacoLangMap[lang]);
                socket.emit("language-change", lang);
            });

            document.getElementById("runBtn").addEventListener("click", async () => {
                if(!monacoEditor) return;
                
                const ext = currentFile.split('.').pop();
                const backendLang = extToBackendLang[ext];
                
                if (!backendLang) {
                    appendOutput("Error: Cannot natively execute file extension '." + ext + "'. Supported: .py, .js, .c, .cpp, .java", "error");
                    return;
                }
                
                appendOutput("Compiling and executing...", "system");
                
                try {
                    const res = await fetch("/api/execute", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            language: backendLang,
                            sourceCode: monacoEditor.getValue()
                        })
                    });
                    const data = await res.json();
                    
                    if(data.error) {
                        appendOutput(data.error, "error");
                        socket.emit("console-output", { text: data.error, type: "error" });
                    } else {
                        const runOut = data.run ? data.run.output : "";
                        const compOut = data.compile ? data.compile.output : "";
                        const fullOut = compOut + "\n" + runOut;
                        appendOutput(fullOut.trim(), "output");
                        socket.emit("console-output", { text: fullOut.trim(), type: "output" });
                    }
                } catch(err) {
                    appendOutput("Execution failed.", "error");
                }
            });
        }

        init();
    </script>
</body>
</html>
