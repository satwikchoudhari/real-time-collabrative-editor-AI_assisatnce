<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - CollabCode</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            padding: 2rem;
            z-index: 10;
        }
        .auth-card {
            width: 100%;
            max-width: 400px;
        }
        .auth-toggle {
            cursor: pointer;
            color: var(--accent);
            font-weight: 600;
        }
        .auth-toggle:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <nav class="navbar">
        <a href="/" class="nav-brand">CollabCode</a>
    </nav>

    <div class="auth-container">
        <div class="glass-panel auth-card">
            <h2 class="text-center mb-4" id="authTitle">Login to your account</h2>
            <form id="authForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" class="form-control" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" required autocomplete="current-password">
                </div>
                <div id="errorMsg" class="text-center mt-2 mb-4" style="color: #ef4444; display: none;"></div>
                <button type="submit" class="btn form-control text-center" id="authBtn">Login</button>
            </form>
            <p class="text-center mt-4 text-muted">
                <span id="toggleText">Don't have an account?</span> 
                <span class="auth-toggle" id="toggleAuth">Register</span>
            </p>
        </div>
    </div>

    <script>
        let isLogin = true;
        const toggleAuth = document.getElementById("toggleAuth");
        const title = document.getElementById("authTitle");
        const toggleText = document.getElementById("toggleText");
        const authBtn = document.getElementById("authBtn");

        toggleAuth.addEventListener('click', () => {
            isLogin = !isLogin;
            title.textContent = isLogin ? "Login to your account" : "Create an account";
            toggleText.textContent = isLogin ? "Don't have an account?" : "Already have an account?";
            toggleAuth.textContent = isLogin ? "Register" : "Login";
            authBtn.textContent = isLogin ? "Login" : "Register";
        });

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const endpoint = isLogin ? "/api/auth/login" : "/api/auth/register";

            try {
                const res = await fetch(endpoint, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.success) {
                    window.location.href = "/dashboard";
                } else {
                    const err = document.getElementById("errorMsg");
                    err.style.display = "block";
                    err.textContent = data.error || "An error occurred";
                }
            } catch (err) {
                console.error(err);
            }
        });
    </script>
</body>
</html>
